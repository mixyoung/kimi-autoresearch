name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt || true
    
    - name: Lint with ruff
      run: |
        pip install ruff
        ruff check scripts/
      continue-on-error: true
    
    - name: Type check with mypy
      run: |
        pip install mypy
        mypy scripts/ --ignore-missing-imports
      continue-on-error: true
    
    - name: Run tests
      run: |
        python -m pytest tests/ -v || python -m unittest discover tests/ -v
      continue-on-error: true
    
    - name: Test script syntax
      run: |
        python -c "
import ast
import glob
import sys

errors = []
for f in glob.glob('scripts/*.py'):
    try:
        with open(f, 'r', encoding='utf-8') as fp:
            ast.parse(fp.read())
    except SyntaxError as e:
        errors.append((f, str(e)))
        print(f'✗ {f}: {e}')

if errors:
    print(f'\n{len(errors)} files with syntax errors')
    sys.exit(1)
else:
    print(f'✓ All scripts have valid syntax')
"
    
    - name: Test CLI commands
      run: |
        python scripts/autoresearch_main.py --help
        python scripts/autoresearch_health_check.py --format json
        python scripts/autoresearch_utils.py stats
